<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finch - Stock Research</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:#222;--border2:#2a2a2a;--text:#e8e4dc;--muted:#666;--accent:#c8f060;--red:#f06060;--green:#60f0a0;--fd:'Fraunces',Georgia,serif;--fm:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--fm);font-size:13px;min-height:100vh;letter-spacing:.01em}
header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);z-index:100}
.logo{font-family:var(--fd);font-size:22px;font-weight:300;color:var(--accent);font-style:italic;letter-spacing:-.02em}
.sw{display:flex;align-items:center;gap:8px;flex:1;max-width:420px;margin-left:auto}
.si{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--fm);font-size:13px;padding:9px 14px;outline:none;flex:1;text-transform:uppercase;letter-spacing:.08em;transition:border-color .2s}
.si::placeholder{color:var(--muted);text-transform:none;letter-spacing:0}
.si:focus{border-color:var(--accent)}
.sb{background:var(--accent);color:#0a0a0a;border:none;font-family:var(--fm);font-size:12px;font-weight:500;padding:9px 18px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:background .2s}
.sb:hover{background:#d8ff70}.sb:disabled{background:var(--border2);color:var(--muted);cursor:not-allowed}
main{max-width:1100px;margin:0 auto;padding:40px 32px}
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:20px}
.lt{font-family:var(--fd);font-size:64px;font-weight:300;font-style:italic;color:var(--accent);line-height:1;letter-spacing:-.03em}
.ls{color:var(--muted);font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.te{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.tc{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);padding:5px 12px;font-size:11px;letter-spacing:.1em;cursor:pointer;transition:border-color .2s,color .2s}
.tc:hover{border-color:var(--accent);color:var(--accent)}
#loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:24px}
#loading.active{display:flex}
.ltick{font-family:var(--fd);font-size:48px;font-weight:300;font-style:italic;color:var(--accent)}
.lbw{width:240px;height:2px;background:var(--border);overflow:hidden}
.lb{height:100%;background:var(--accent);animation:lb 2.5s ease-in-out infinite}
@keyframes lb{0%{width:0}50%{width:70%}100%{width:100%}}
.lm{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
#stockContent{display:none}
#stockContent.active{display:block}
.sh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;gap:32px;flex-wrap:wrap}
.stl{font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}
.sn{font-family:var(--fd);font-size:42px;font-weight:300;font-style:italic;letter-spacing:-.02em;line-height:1}
.sc{color:var(--muted);font-size:12px;margin-top:6px;letter-spacing:.04em}
.spw{text-align:right}
.sp{font-family:var(--fd);font-size:42px;font-weight:300;letter-spacing:-.02em;line-height:1}
.spc{font-size:13px;margin-top:6px;letter-spacing:.04em}
.pos{color:var(--green)}.neg{color:var(--red)}.mut{color:var(--muted)}
.ss{margin-bottom:40px}
.sgl{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:8px;margin-top:16px;display:flex;align-items:center;gap:12px}
.sgl::after{content:'';flex:1;height:1px;background:var(--border)}
.sgl:first-child{margin-top:0}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.stc{background:var(--surface);padding:14px 18px}
.stcl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.stcv{font-size:15px;font-family:var(--fd);font-weight:300;letter-spacing:-.01em}
.secl{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.secl::after{content:'';flex:1;height:1px;background:var(--border)}
.cs{margin-bottom:40px}
.cw{background:var(--surface);border:1px solid var(--border);padding:24px}
.tc2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
@media(max-width:700px){.tc2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);padding:24px}
.rr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:12px;min-height:44px}
.rr:last-child{border-bottom:none}
.rf{color:var(--text);font-size:12px}.rd{color:var(--muted);font-size:11px}
.rb{font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border:1px solid;white-space:nowrap}
.rb-buy{border-color:var(--green);color:var(--green)}.rb-hold{border-color:#f0d060;color:#f0d060}
.rb-sell{border-color:var(--red);color:var(--red)}.rb-n{border-color:var(--muted);color:var(--muted)}
.rt{color:var(--muted);font-size:11px;text-align:right;white-space:nowrap}
.sum{font-size:13px;line-height:1.75;color:#b8b4ac}
#errorMsg{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:16px;text-align:center}
#errorMsg.active{display:flex}
.et{font-family:var(--fd);font-size:32px;font-weight:300;font-style:italic;color:var(--red)}
.eb{color:var(--muted);font-size:12px;max-width:440px;line-height:1.6}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .4s ease forwards}
.fu2{animation:fu .4s ease .1s forwards;opacity:0}
.fu3{animation:fu .4s ease .2s forwards;opacity:0}
.fu4{animation:fu .4s ease .3s forwards;opacity:0}
</style>
</head>
<body>
<header>
  <div class="logo">finch</div>
  <div class="sw">
    <input class="si" id="ti" type="text" placeholder="Enter ticker (e.g. AAPL)" maxlength="10" autocomplete="off"/>
    <button class="sb" id="sb" onclick="go()">Research</button>
  </div>
</header>
<main>
  <div id="landing">
    <div class="lt">finch.</div>
    <div class="ls">Live stock research, powered by AI</div>
    <div class="te">
      <div class="tc" onclick="qs('AAPL')">AAPL</div>
      <div class="tc" onclick="qs('TSLA')">TSLA</div>
      <div class="tc" onclick="qs('NVDA')">NVDA</div>
      <div class="tc" onclick="qs('MSFT')">MSFT</div>
      <div class="tc" onclick="qs('AMZN')">AMZN</div>
      <div class="tc" onclick="qs('META')">META</div>
      <div class="tc" onclick="qs('GOOGL')">GOOGL</div>
    </div>
  </div>
  <div id="loading">
    <div class="ltick" id="ltick"></div>
    <div class="lbw"><div class="lb"></div></div>
    <div class="lm" id="lm">Fetching live data...</div>
  </div>
  <div id="errorMsg">
    <div class="et">Not found.</div>
    <div class="eb" id="eb">Could not retrieve data.</div>
  </div>
  <div id="stockContent">
    <div class="sh fu">
      <div>
        <div class="stl" id="dtick"></div>
        <div class="sn" id="cname"></div>
        <div class="sc" id="csec"></div>
      </div>
      <div class="spw">
        <div class="sp" id="sprice"></div>
        <div class="spc" id="schange"></div>
      </div>
    </div>
    <div class="ss fu2">
      <div class="sgl">Valuation &amp; Earnings</div>
      <div class="sg" id="g1"></div>
      <div class="sgl" style="margin-top:16px">Fundamentals</div>
      <div class="sg" id="g2"></div>
      <div class="sgl" style="margin-top:16px">Trading</div>
      <div class="sg" id="g3"></div>
    </div>
    <div class="cs fu3">
      <div class="secl">1-Year Price Chart</div>
      <div class="cw"><canvas id="chart" height="220"></canvas></div>
    </div>
    <div class="tc2 fu4">
      <div class="card">
        <div class="secl" style="margin-bottom:16px">Analyst Ratings</div>
        <div id="ratings"></div>
      </div>
      <div class="card">
        <div class="secl" style="margin-bottom:16px">AI Summary</div>
        <div class="sum" id="summary"></div>
      </div>
    </div>
  </div>

<script>
var WU='https://shy-bush-502e.komsi-mba.workers.dev';

function qs(t){document.getElementById('ti').value=t;go();}
document.getElementById('ti').addEventListener('keydown',function(e){if(e.key==='Enter')go();});

function go(){
  var ticker=document.getElementById('ti').value.trim().toUpperCase();
  if(!ticker)return;
  setState('loading');
  document.getElementById('ltick').textContent=ticker;
  document.getElementById('sb').disabled=true;
  fetchStock(ticker).then(function(data){
    render(ticker,data);
    setState('content');
  }).catch(function(err){
    document.getElementById('eb').textContent=err.message||'An error occurred. Please try again.';
    setState('error');
  }).finally(function(){
    document.getElementById('sb').disabled=false;
  });
}

function api(prompt){
  return fetch(WU,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:3000,
      system:'You are a financial data API. Output ONLY a single JSON object. No markdown, no backticks, no explanation, no text before or after. Start with { and end with }. All numeric fields must contain real searched values.',
      messages:[{role:'user',content:prompt}],
      tools:[{type:'web_search_20250305',name:'web_search'}]
    })
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'Server error '+r.status);});
    return r.json();
  }).then(function(d){
    if(d.error)throw new Error(d.error.message||'API error');
    return d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
  });
}

function parseJ(raw){
  if(!raw||!raw.trim())throw new Error('No response from server.');
  var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
  if(s===-1||e<=s)throw new Error('Invalid response. Please try again.');
  var chunk=raw.slice(s,e+1);
  chunk=chunk.replace(/,(\s*[}\]])/g,'$1');
  try{return JSON.parse(chunk);}catch(ex){throw new Error('Could not parse response. Please try again.');}
}

function fetchStock(ticker){
  var d=new Date();
  var today=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
  var yr=new Date(d);yr.setFullYear(yr.getFullYear()-1);
  var yearAgo=yr.getFullYear()+'-'+(yr.getMonth()<9?'0':'')+(yr.getMonth()+1)+'-01';

  var p1='Search "'+ticker+' stock price today '+today+'" and return the exact real-time or most recent trading price, day change, day high, day low, and volume.';
  var p2='Search "'+ticker+' Yahoo Finance statistics" and return market cap, P/E ratio TTM, forward P/E, EPS TTM, annual revenue, annual net income, dividend yield, 52-week high, 52-week low, average daily volume.';
  var p3='Search "'+ticker+' short float finviz" and return the short float percentage and institutional ownership percentage.';
  var p4='Search "'+ticker+' analyst rating price target 2026" and return 5 recent analyst entries with firm name, rating, price target, previous price target, date.';
  var p5='Search "'+ticker+' weekly stock price history '+yearAgo+' to '+today+'" and return 52 real weekly closing prices from oldest to newest as plain numbers.';
  var schema='{"ticker":"'+ticker+'","companyName":"STR","sector":"STR","currentPrice":NUM,"priceChange":NUM,"priceChangePct":NUM,"dayHigh":NUM,"dayLow":NUM,"marketCap":"STR","peRatio":NUM,"forwardPE":NUM,"eps":NUM,"revenue":"STR","netIncome":"STR","dividendYield":"STR","52wHigh":NUM,"52wLow":NUM,"volume":"STR","avgVolume":"STR","shortFloat":"STR","institutionalOwn":"STR","priceHistory":[NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM,NUM],"analystRatings":[{"firm":"STR","rating":"STR","priceTarget":NUM,"prevTarget":NUM,"date":"YYYY-MM-DD"}],"summary":"STR"}';
  var prompt=p1+' '+p2+' '+p3+' '+p4+' '+p5+' Fill ALL fields with real values from searches. Return ONLY the JSON: '+schema;

  return api(prompt).then(parseJ);
}

function f(v,p,s){
  p=p||'';s=s||'';
  if(v===null||v===undefined||v===''||v==='N/A'||v==='—')return '—';
  return p+v+s;
}

function render(ticker,data){
  document.getElementById('dtick').textContent=data.ticker||ticker;
  document.getElementById('cname').textContent=data.companyName||ticker;
  document.getElementById('csec').textContent=data.sector||'';
  var price=parseFloat(data.currentPrice)||0;
  var chg=parseFloat(data.priceChange)||0;
  var pct=parseFloat(data.priceChangePct)||0;
  var up=chg>=0;
  document.getElementById('sprice').textContent='$'+price.toFixed(2);
  var ch='<span class="'+(up?'pos':'neg')+'">'+(up?'+':'')+chg.toFixed(2)+' ('+(up?'+':'')+pct.toFixed(2)+'%)</span>';
  if(data.dayHigh&&data.dayLow)ch+=' <span class="mut">· H $'+data.dayHigh+' / L $'+data.dayLow+'</span>';
  document.getElementById('schange').innerHTML=ch;

  function grid(id,items){
    document.getElementById(id).innerHTML=items.map(function(x){
      return '<div class="stc"><div class="stcl">'+x[0]+'</div><div class="stcv">'+x[1]+'</div></div>';
    }).join('');
  }
  grid('g1',[
    ['Market Cap',f(data.marketCap)],
    ['P/E (TTM)',f(data.peRatio)],
    ['Forward P/E',f(data.forwardPE)],
    ['EPS (TTM)',data.eps?'$'+data.eps:'—'],
    ['Revenue',f(data.revenue)],
    ['Net Income',f(data.netIncome)]
  ]);
  grid('g2',[
    ['52W High',data['52wHigh']?'$'+data['52wHigh']:'—'],
    ['52W Low',data['52wLow']?'$'+data['52wLow']:'—'],
    ['Dividend Yield',f(data.dividendYield)],
    ['Short Float',f(data.shortFloat)],
    ['Inst. Own',f(data.institutionalOwn)]
  ]);
  grid('g3',[
    ['Volume',f(data.volume)],
    ['Avg Volume',f(data.avgVolume)]
  ]);

  window._ph=data.priceHistory||[];
  drawChart(window._ph);

  var re=document.getElementById('ratings');
  if(data.analystRatings&&data.analystRatings.length){
    re.innerHTML=data.analystRatings.map(function(r){
      var rc=ratingClass(r.rating);
      var th='<span>'+(r.priceTarget?'$'+r.priceTarget:'—')+'</span>';
      if(r.prevTarget&&r.priceTarget){
        if(r.priceTarget>r.prevTarget)th='<span class="pos">↑ $'+r.priceTarget+'</span>';
        else if(r.priceTarget<r.prevTarget)th='<span class="neg">↓ $'+r.priceTarget+'</span>';
      }
      return '<div class="rr"><div style="flex:1"><div class="rf">'+r.firm+'</div><div class="rd">'+fmtDate(r.date)+'</div></div><span style="flex-shrink:0;align-self:center" class="rb '+rc+'">'+r.rating+'</span><div class="rt" style="flex-shrink:0;min-width:80px;text-align:right">PT: '+th+'</div></div>';
    }).join('');
  }else{
    re.innerHTML='<div style="color:var(--muted);font-size:12px;padding:12px 0">No analyst data available</div>';
  }
  document.getElementById('summary').textContent=data.summary||'No summary available.';
}

function ratingClass(r){
  r=(r||'').toLowerCase();
  if(r.includes('buy')||r.includes('overweight')||r.includes('outperform'))return 'rb-buy';
  if(r.includes('sell')||r.includes('underweight')||r.includes('underperform'))return 'rb-sell';
  if(r.includes('hold')||r.includes('neutral')||r.includes('equal'))return 'rb-hold';
  return 'rb-n';
}

function fmtDate(ds){
  if(!ds)return '';
  try{return new Date(ds).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch(e){return ds;}
}

function drawChart(prices){
  var canvas=document.getElementById('chart');
  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.clientWidth-48;
  var H=220;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  var clean=[];
  for(var i=0;i<prices.length;i++){
    var p=parseFloat(Array.isArray(prices[i])?prices[i][1]:prices[i]);
    if(!isNaN(p)&&p>0)clean.push(p);
  }
  if(clean.length<2){
    ctx.fillStyle='#444';ctx.font='12px DM Mono,monospace';
    ctx.fillText('No price history available',20,H/2);return;
  }
  var pad={t:16,r:16,b:40,l:64};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  var mn=clean[0],mx=clean[0];
  for(var i=1;i<clean.length;i++){if(clean[i]<mn)mn=clean[i];if(clean[i]>mx)mx=clean[i];}
  var rng=mx-mn||1;
  var up=clean[clean.length-1]>=clean[0];
  var lc=up?'#60f0a0':'#f06060',fc=up?'rgba(96,240,160,.07)':'rgba(240,96,96,.07)';
  ctx.strokeStyle='#1e1e1e';ctx.lineWidth=1;
  for(var i=0;i<=4;i++){
    var y=pad.t+(cH/4)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+cW,y);ctx.stroke();
    var v=mx-(rng/4)*i;
    ctx.fillStyle='#555';ctx.font='10px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText('$'+(v>=100?v.toFixed(0):v.toFixed(2)),pad.l-8,y+4);
  }
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var now=new Date();
  ctx.textAlign='center';ctx.fillStyle='#555';ctx.font='10px DM Mono,monospace';
  for(var i=0;i<5;i++){
    var x=pad.l+(i/4)*cW;
    var dd=new Date(now);dd.setDate(dd.getDate()-Math.round((1-i/4)*365));
    ctx.fillText(months[dd.getMonth()]+" '"+String(dd.getFullYear()).slice(2),x,H-10);
  }
  ctx.beginPath();
  for(var i=0;i<clean.length;i++){
    var x=pad.l+(i/(clean.length-1))*cW,y=pad.t+((mx-clean[i])/rng)*cH;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.lineTo(pad.l+cW,pad.t+cH);ctx.lineTo(pad.l,pad.t+cH);ctx.closePath();
  ctx.fillStyle=fc;ctx.fill();
  ctx.beginPath();
  for(var i=0;i<clean.length;i++){
    var x=pad.l+(i/(clean.length-1))*cW,y=pad.t+((mx-clean[i])/rng)*cH;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=lc;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();
  var lx=pad.l+cW,ly=pad.t+((mx-clean[clean.length-1])/rng)*cH;
  ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle=lc;ctx.fill();
}

function setState(s){
  document.getElementById('landing').style.display=s==='landing'?'flex':'none';
  document.getElementById('loading').className=s==='loading'?'active':'';
  document.getElementById('errorMsg').className=s==='error'?'active':'';
  document.getElementById('stockContent').className=s==='content'?'active':'';
}

window.addEventListener('resize',function(){
  if(document.getElementById('stockContent').className==='active'&&window._ph)drawChart(window._ph);
});
</script>
</body>
</html>
