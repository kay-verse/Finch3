<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finch — Stock Research</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #181818;
      --border: #222222;
      --border2: #2a2a2a;
      --text: #e8e4dc;
      --muted: #666;
      --accent: #c8f060;
      --accent2: #60c8f0;
      --red: #f06060;
      --green: #60f0a0;
      --font-display: 'Fraunces', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      min-height: 100vh;
      letter-spacing: 0.01em;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 300;
      color: var(--accent);
      font-style: italic;
      letter-spacing: -0.02em;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      max-width: 420px;
      margin-left: auto;
    }

    .search-input {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 9px 14px;
      outline: none;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); text-transform: none; letter-spacing: 0; }
    .search-input:focus { border-color: var(--accent); }

    .search-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      padding: 9px 18px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }
    .search-btn:hover { background: #d8ff70; }
    .search-btn:active { transform: scale(0.98); }
    .search-btn:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px;
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      gap: 20px;
    }
    .landing-title {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .landing-sub { color: var(--muted); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
    .ticker-examples { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .ticker-chip {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 5px 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .ticker-chip:hover { border-color: var(--accent); color: var(--accent); }

    .loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; gap: 24px; }
    .loading.active { display: flex; }
    .loading-ticker { font-family: var(--font-display); font-size: 48px; font-weight: 300; font-style: italic; color: var(--accent); }
    .loading-bar-wrap { width: 240px; height: 2px; background: var(--border); overflow: hidden; }
    .loading-bar { height: 100%; background: var(--accent); animation: loadbar 2.5s ease-in-out infinite; }
    @keyframes loadbar { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
    .loading-msg { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }

    .stock-content { display: none; }
    .stock-content.active { display: block; }

    .stock-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 40px; gap: 32px; flex-wrap: wrap; }
    .stock-ticker-label { font-size: 11px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
    .stock-name { font-family: var(--font-display); font-size: 42px; font-weight: 300; font-style: italic; letter-spacing: -0.02em; line-height: 1; }
    .stock-company { color: var(--muted); font-size: 12px; margin-top: 6px; letter-spacing: 0.04em; }
    .stock-price-wrap { text-align: right; }
    .stock-price { font-family: var(--font-display); font-size: 42px; font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
    .stock-change { font-size: 13px; margin-top: 6px; letter-spacing: 0.04em; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral { color: var(--muted); }

    /* Stats grid — two rows */
    .stats-section { margin-bottom: 40px; }
    .stats-group-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .stats-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .stats-group-label:first-child { margin-top: 0; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }
    .stat-cell { background: var(--surface); padding: 14px 18px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
    .stat-value { font-size: 15px; font-family: var(--font-display); font-weight: 300; letter-spacing: -0.01em; }

    .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .chart-section { margin-bottom: 40px; }
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); padding: 24px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 40px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }

    .rating-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .rating-row:last-child { border-bottom: none; }
    .rating-firm { color: var(--text); font-size: 12px; }
    .rating-date { color: var(--muted); font-size: 11px; }
    .rating-badge { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border: 1px solid; white-space: nowrap; }
    .rating-buy { border-color: var(--green); color: var(--green); }
    .rating-hold { border-color: #f0d060; color: #f0d060; }
    .rating-sell { border-color: var(--red); color: var(--red); }
    .rating-neutral { border-color: var(--muted); color: var(--muted); }
    .rating-target { color: var(--muted); font-size: 11px; text-align: right; white-space: nowrap; }

    .summary-text { font-size: 13px; line-height: 1.75; color: #b8b4ac; }

    .error-msg { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 40vh; gap: 16px; text-align: center; }
    .error-msg.active { display: flex; }
    .error-title { font-family: var(--font-display); font-size: 32px; font-weight: 300; font-style: italic; color: var(--red); }
    .error-body { color: var(--muted); font-size: 12px; max-width: 400px; line-height: 1.6; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .fade-up-2 { animation: fadeUp 0.4s ease 0.1s forwards; opacity: 0; }
    .fade-up-3 { animation: fadeUp 0.4s ease 0.2s forwards; opacity: 0; }
    .fade-up-4 { animation: fadeUp 0.4s ease 0.3s forwards; opacity: 0; }
  </style>
</head>
<body>

<header>
  <div class="logo">finch</div>
  <div class="search-wrap">
    <input class="search-input" id="tickerInput" type="text" placeholder="Enter ticker (e.g. AAPL)" maxlength="10" autocomplete="off"/>
    <button class="search-btn" id="searchBtn" onclick="searchStock()">Research</button>
  </div>
</header>

<main>
  <div class="landing" id="landing">
    <div class="landing-title">finch.</div>
    <div class="landing-sub">Live stock research, powered by AI</div>
    <div class="ticker-examples">
      <div class="ticker-chip" onclick="quickSearch('AAPL')">AAPL</div>
      <div class="ticker-chip" onclick="quickSearch('TSLA')">TSLA</div>
      <div class="ticker-chip" onclick="quickSearch('NVDA')">NVDA</div>
      <div class="ticker-chip" onclick="quickSearch('MSFT')">MSFT</div>
      <div class="ticker-chip" onclick="quickSearch('AMZN')">AMZN</div>
      <div class="ticker-chip" onclick="quickSearch('META')">META</div>
      <div class="ticker-chip" onclick="quickSearch('GOOGL')">GOOGL</div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-ticker" id="loadingTicker"></div>
    <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
    <div class="loading-msg" id="loadingMsg">Fetching live data...</div>
  </div>

  <div class="error-msg" id="errorMsg">
    <div class="error-title">Not found.</div>
    <div class="error-body" id="errorBody">Could not retrieve data for this ticker.</div>
  </div>

  <div class="stock-content" id="stockContent">
    <div class="stock-header fade-up">
      <div class="stock-name-wrap">
        <div class="stock-ticker-label" id="displayTicker"></div>
        <div class="stock-name" id="companyName"></div>
        <div class="stock-company" id="companySector"></div>
      </div>
      <div class="stock-price-wrap">
        <div class="stock-price" id="stockPrice"></div>
        <div class="stock-change" id="stockChange"></div>
      </div>
    </div>

    <div class="stats-section fade-up-2">
      <div class="stats-group-label">Valuation & Earnings</div>
      <div class="stats-grid" id="statsGrid1"></div>
      <div class="stats-group-label" style="margin-top:16px">Fundamentals</div>
      <div class="stats-grid" id="statsGrid2"></div>
      <div class="stats-group-label" style="margin-top:16px">Trading</div>
      <div class="stats-grid" id="statsGrid3"></div>
    </div>

    <div class="chart-section fade-up-3">
      <div class="section-label">1-Year Price Chart</div>
      <div class="chart-wrap"><canvas id="priceChart" height="220"></canvas></div>
    </div>

    <div class="two-col fade-up-4">
      <div class="card">
        <div class="section-label" style="margin-bottom:16px">Analyst Ratings</div>
        <div id="analystRatings"></div>
      </div>
      <div class="card">
        <div class="section-label" style="margin-bottom:16px">AI Summary</div>
        <div class="summary-text" id="aiSummary"></div>
      </div>
    </div>
  </div>
</main>

<script>
  const WORKER_URL = 'https://shy-bush-502e.komsi-mba.workers.dev';

  function quickSearch(ticker) {
    document.getElementById('tickerInput').value = ticker;
    searchStock();
  }

  document.getElementById('tickerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchStock();
  });

  async function searchStock() {
    const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
    if (!ticker) return;
    showState('loading');
    document.getElementById('loadingTicker').textContent = ticker;
    document.getElementById('loadingMsg').textContent = 'Searching Yahoo Finance & Finviz...';
    document.getElementById('searchBtn').disabled = true;
    try {
      const stockData = await fetchStockData(ticker);
      renderApp(ticker, stockData);
      showState('content');
    } catch (err) {
      console.error(err);
      document.getElementById('errorBody').textContent = err.message || 'An error occurred. Please try again.';
      showState('error');
    } finally {
      document.getElementById('searchBtn').disabled = false;
    }
  }

  async function callClaude(prompt) {
    const body = {
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1500,
      messages: [{ role: 'user', content: prompt }],
      tools: [{ type: 'web_search_20250305', name: 'web_search' }]
    };
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Server error ${res.status}`);
    }
    const data = await res.json();
    return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  }

  async function fetchStockData(ticker) {
    const today = new Date().toISOString().split('T')[0];

    const prompt = `Today is ${today}. Search Yahoo Finance and Finviz for the CURRENT live stock data for ticker ${ticker}.

IMPORTANT: The current price must be the real-time or most recent trading price from today. Search specifically for "${ticker} stock price today" to get the accurate current price. Do NOT use yesterday's close if the market is open.

Return ONLY a valid JSON object (no markdown, no backticks, no preamble) with this exact structure:

{
  "ticker": "${ticker}",
  "companyName": "Full company name",
  "sector": "Sector / Industry",
  "currentPrice": 123.45,
  "priceChange": 1.23,
  "priceChangePct": 0.85,
  "dayHigh": 125.00,
  "dayLow": 121.00,

  "marketCap": "2.5T",
  "peRatio": 28.5,
  "forwardPE": 24.1,
  "eps": 6.12,
  "revenue": "513.6B",
  "netIncome": "59.2B",
  "dividendYield": "0.5%",

  "52wHigh": 150.00,
  "52wLow": 100.00,
  "volume": "45.2M",
  "avgVolume": "55.1M",
  "shortFloat": "1.2%",
  "institutionalOwn": "74.5%",

  "priceHistory": [
    [timestamp_ms, price],
    ...exactly 52 entries representing weekly closing prices for the past 52 weeks, oldest first...
  ],

  "analystRatings": [
    {"firm": "Goldman Sachs", "rating": "Buy", "priceTarget": 210, "prevTarget": 190, "date": "2026-02-15"},
    {"firm": "Morgan Stanley", "rating": "Overweight", "priceTarget": 205, "prevTarget": 185, "date": "2026-02-10"},
    {"firm": "JPMorgan", "rating": "Neutral", "priceTarget": 180, "prevTarget": 175, "date": "2026-01-20"},
    {"firm": "Barclays", "rating": "Hold", "priceTarget": 175, "prevTarget": 170, "date": "2026-01-15"},
    {"firm": "Bank of America", "rating": "Buy", "priceTarget": 215, "prevTarget": 195, "date": "2025-12-10"}
  ],

  "summary": "3-4 sentence summary covering current price action, recent news, analyst sentiment, and near-term outlook."
}

For priceHistory: provide exactly 52 [timestamp_ms, price] pairs. Each timestamp should be the Unix epoch in milliseconds for a Monday approximately 1 week apart, spanning the past 52 weeks. Use realistic prices that reflect the actual 52-week range of the stock.

Use only real data from web search. If a value is truly unavailable use null.`;

    const raw = await callClaude(prompt);

    let parsed;
    try {
      parsed = JSON.parse(raw.trim());
    } catch {
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        try { parsed = JSON.parse(match[0]); }
        catch { throw new Error('Failed to parse stock data. Please try again.'); }
      } else {
        throw new Error('Could not retrieve data for ' + ticker + '. Check the ticker symbol and try again.');
      }
    }
    return parsed;
  }

  function fmt(val, prefix = '', suffix = '') {
    if (val === null || val === undefined || val === '') return '—';
    return prefix + val + suffix;
  }

  function renderApp(ticker, data) {
    document.getElementById('displayTicker').textContent = data.ticker || ticker;
    document.getElementById('companyName').textContent = data.companyName || ticker;
    document.getElementById('companySector').textContent = data.sector || '';

    const price = parseFloat(data.currentPrice) || 0;
    const change = parseFloat(data.priceChange) || 0;
    const pct = parseFloat(data.priceChangePct) || 0;
    const isPos = change >= 0;

    document.getElementById('stockPrice').textContent = '$' + price.toFixed(2);
    document.getElementById('stockChange').innerHTML =
      `<span class="${isPos ? 'positive' : 'negative'}">${isPos ? '+' : ''}${change.toFixed(2)} (${isPos ? '+' : ''}${pct.toFixed(2)}%)</span>` +
      (data.dayHigh && data.dayLow ? `<span class="neutral"> · H: $${data.dayHigh} / L: $${data.dayLow}</span>` : '') +
      `<span class="neutral"> · Today</span>`;

    // Valuation & Earnings
    const stats1 = [
      { label: 'Market Cap', value: fmt(data.marketCap) },
      { label: 'P/E Ratio (TTM)', value: fmt(data.peRatio) },
      { label: 'Forward P/E', value: fmt(data.forwardPE) },
      { label: 'EPS (TTM)', value: data.eps ? '$' + data.eps : '—' },
      { label: 'Revenue', value: fmt(data.revenue) },
      { label: 'Net Income', value: fmt(data.netIncome) },
    ];

    // Trading fundamentals
    const stats2 = [
      { label: '52W High', value: data['52wHigh'] ? '$' + data['52wHigh'] : '—' },
      { label: '52W Low', value: data['52wLow'] ? '$' + data['52wLow'] : '—' },
      { label: 'Dividend Yield', value: fmt(data.dividendYield) },
      { label: 'Short Float', value: fmt(data.shortFloat) },
      { label: 'Inst. Ownership', value: fmt(data.institutionalOwn) },
    ];

    // Volume
    const stats3 = [
      { label: 'Volume', value: fmt(data.volume) },
      { label: 'Avg Volume', value: fmt(data.avgVolume) },
    ];

    const renderGrid = (id, stats) => {
      document.getElementById(id).innerHTML = stats.map(s =>
        `<div class="stat-cell"><div class="stat-label">${s.label}</div><div class="stat-value">${s.value}</div></div>`
      ).join('');
    };
    renderGrid('statsGrid1', stats1);
    renderGrid('statsGrid2', stats2);
    renderGrid('statsGrid3', stats3);

    // Chart
    window._lastPriceHistory = data.priceHistory || [];
    drawChart(data.priceHistory || []);

    // Analyst ratings
    const ratingsEl = document.getElementById('analystRatings');
    if (data.analystRatings && data.analystRatings.length) {
      ratingsEl.innerHTML = data.analystRatings.map(r => {
        const rClass = getRatingClass(r.rating);
        const targetHtml = r.prevTarget
          ? (r.priceTarget > r.prevTarget ? `<span class="positive">↑ $${r.priceTarget}</span>`
              : r.priceTarget < r.prevTarget ? `<span class="negative">↓ $${r.priceTarget}</span>`
              : `<span>$${r.priceTarget}</span>`)
          : `<span>$${r.priceTarget || '—'}</span>`;
        return `<div class="rating-row">
          <div><div class="rating-firm">${r.firm}</div><div class="rating-date">${formatDate(r.date)}</div></div>
          <span class="rating-badge ${rClass}">${r.rating}</span>
          <div class="rating-target">PT: ${targetHtml}</div>
        </div>`;
      }).join('');
    } else {
      ratingsEl.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:12px 0">No recent analyst data</div>';
    }

    document.getElementById('aiSummary').textContent = data.summary || 'No summary available.';
  }

  function getRatingClass(rating) {
    const r = (rating || '').toLowerCase();
    if (r.includes('buy') || r.includes('overweight') || r.includes('outperform') || r.includes('strong buy')) return 'rating-buy';
    if (r.includes('sell') || r.includes('underweight') || r.includes('underperform')) return 'rating-sell';
    if (r.includes('hold') || r.includes('neutral') || r.includes('equal')) return 'rating-hold';
    return 'rating-neutral';
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try { return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
    catch { return dateStr; }
  }

  function drawChart(priceHistory) {
    const canvas = document.getElementById('priceChart');
    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.clientWidth - 48;
    const H = 220;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    if (!priceHistory || priceHistory.length < 2) {
      ctx.fillStyle = '#444';
      ctx.font = '12px DM Mono, monospace';
      ctx.fillText('No price history available', 20, H / 2);
      return;
    }

    // Normalise: accept either [timestamp, price] pairs or plain numbers
    let entries = priceHistory.map((item, i) => {
      if (Array.isArray(item)) return { ts: item[0], price: parseFloat(item[1]) };
      return { ts: i, price: parseFloat(item) };
    }).filter(e => !isNaN(e.price));

    if (entries.length < 2) return;

    // Sort by timestamp
    entries.sort((a, b) => a.ts - b.ts);

    const prices = entries.map(e => e.price);
    const timestamps = entries.map(e => e.ts);
    const hasRealTimestamps = Array.isArray(priceHistory[0]);

    const pad = { top: 16, right: 16, bottom: 40, left: 64 };
    const chartW = W - pad.left - pad.right;
    const chartH = H - pad.top - pad.bottom;
    const minP = Math.min(...prices), maxP = Math.max(...prices);
    const range = maxP - minP || 1;
    const isPositive = prices[prices.length - 1] >= prices[0];
    const lineColor = isPositive ? '#60f0a0' : '#f06060';
    const fillColor = isPositive ? 'rgba(96,240,160,0.07)' : 'rgba(240,96,96,0.07)';

    // Grid lines + Y labels
    ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (chartH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + chartW, y); ctx.stroke();
      const val = maxP - (range / 4) * i;
      ctx.fillStyle = '#555'; ctx.font = '10px DM Mono, monospace'; ctx.textAlign = 'right';
      ctx.fillText('$' + val.toFixed(val >= 100 ? 0 : 2), pad.left - 8, y + 4);
    }

    // X axis labels — 5 evenly spaced real dates
    ctx.textAlign = 'center'; ctx.fillStyle = '#555'; ctx.font = '10px DM Mono, monospace';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const labelCount = 5;
    for (let i = 0; i < labelCount; i++) {
      const frac = i / (labelCount - 1);
      const x = pad.left + frac * chartW;
      let label;
      if (hasRealTimestamps) {
        const idx = Math.round(frac * (entries.length - 1));
        const d = new Date(timestamps[idx]);
        label = months[d.getMonth()] + ' \'' + String(d.getFullYear()).slice(2);
      } else {
        const now = new Date();
        const d = new Date(now);
        d.setMonth(d.getMonth() - Math.round((1 - frac) * 12));
        label = months[d.getMonth()] + ' \'' + String(d.getFullYear()).slice(2);
      }
      ctx.fillText(label, x, H - 10);
    }

    // Fill area
    ctx.beginPath();
    entries.forEach((e, i) => {
      const x = pad.left + (i / (entries.length - 1)) * chartW;
      const y = pad.top + ((maxP - e.price) / range) * chartH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo(pad.left + chartW, pad.top + chartH);
    ctx.lineTo(pad.left, pad.top + chartH);
    ctx.closePath(); ctx.fillStyle = fillColor; ctx.fill();

    // Line
    ctx.beginPath();
    entries.forEach((e, i) => {
      const x = pad.left + (i / (entries.length - 1)) * chartW;
      const y = pad.top + ((maxP - e.price) / range) * chartH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();

    // End dot
    const lastX = pad.left + chartW;
    const lastY = pad.top + ((maxP - prices[prices.length - 1]) / range) * chartH;
    ctx.beginPath(); ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
    ctx.fillStyle = lineColor; ctx.fill();
  }

  function showState(state) {
    document.getElementById('landing').style.display = state === 'landing' ? 'flex' : 'none';
    document.getElementById('loading').className = 'loading' + (state === 'loading' ? ' active' : '');
    document.getElementById('errorMsg').className = 'error-msg' + (state === 'error' ? ' active' : '');
    document.getElementById('stockContent').className = 'stock-content' + (state === 'content' ? ' active' : '');
  }

  window.addEventListener('resize', () => {
    if (document.getElementById('stockContent').classList.contains('active') && window._lastPriceHistory) {
      drawChart(window._lastPriceHistory);
    }
  });
</script>
</body>
